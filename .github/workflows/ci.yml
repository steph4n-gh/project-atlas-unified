name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # Job 1: Run unit and integration tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Run NPM Dependency Audit
        run: |
          cargo run --release --manifest-path security-auditor/Cargo.toml --package security-auditor --bin security-auditor -- --lockfile package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate Python Dependency Graph
        run: |
          python scripts/dump_dependencies.py

      - name: Run Python Dependency Audit
        run: |
          cargo run --release --manifest-path security-auditor/Cargo.toml --package security-auditor --bin security-auditor -- --graph python-deps.json

      - name: Run Pytest suite
        run: |
          PYTHONPATH=. pytest tests/ultrametric/ tests/qan/ \
            --ignore=tests/qan/e2e/test_mlx_speculative.py \
            --ignore=tests/qan/e2e/test_speculative_decoding.py \
            --ignore=tests/qan/unit/test_adelic_speculation.py \
            --ignore=tests/qan/unit/test_codebase_chat.py

  # Job 2: Deploy Static MoE Studio to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
